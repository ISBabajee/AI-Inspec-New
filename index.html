
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Inspec</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#DC2626"> <!-- New Brand Red Color -->
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-dark': '#0D2A4C', // Dark Navy from image theme
              'brand-light-blue': '#38bdf8', // sky-400, for accents
              'brand-orange': '#F7931E', // Orange from IR image
            }
          },
        },
        plugins: [],
      }
    </script>
    <style>
      /* --- Accessibility, Readability & Font Scaling Enhancements --- */
      html {
        /* Proportional font scaling, now smaller for mobile */
        font-size: clamp(0.9rem, 0.85rem + 0.2vw, 1rem); /* Scales from ~14.4px to 16px */
      }
      
      body {
        /* Set a more readable, sans-serif font stack */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        
        /* Improve default color contrast and reduce eye strain by using dark gray instead of pure black */
        color: #1f2937; /* Corresponds to Tailwind's gray-800 */
        background-color: #f1f5f9; /* slate-100, a light gray */

        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      .dark body {
        color: #e2e8f0; /* slate-200 */
        background-color: #020617; /* slate-950, a very dark background */
      }

      /* Set a more generous line-height for main content areas for better paragraph readability.
         Utility classes like `leading-tight` or `leading-normal` from Tailwind can override this. */
      main {
        line-height: 1.7;
        letter-spacing: 0.01rem; /* Subtle increase in letter spacing for readability */
      }

      /* Improve spacing between paragraphs for better text flow */
      p {
        margin-bottom: 0.8em;
      }

      /* Ensure links are always identifiable with an underline for accessibility */
      a.font-medium, a.text-blue-600, a.text-green-600, .toc-list a {
        text-decoration: underline;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 3px;
        transition: text-decoration-thickness 0.2s ease-in-out, color 0.2s ease-in-out;
      }

      /* Light mode links - Using new brand color */
      a.text-blue-600, a.text-brand-light-blue { color: #38bdf8; }
      .dark a.text-blue-600, .dark a.text-brand-light-blue { color: #38bdf8; } /* Using same vibrant blue for dark mode */
      
      a:hover, a:focus {
        text-decoration-thickness: 2.5px;
      }

      /* Ensure headings have proper spacing to create a clear visual hierarchy */
      h1, h2, h3, h4, h5, h6 {
        line-height: 1.3;
        margin-top: 1.25em;
        margin-bottom: 0.6em;
      }

      /* For users with dyslexia, left-aligned text is much easier to read than justified text. 
         Tailwind defaults to left-aligned, so this is just a confirmation of that principle. */
      body {
        text-align: left;
      }

      /* Ensure form elements inherit the base font for visual consistency */
      input, button, textarea, select {
        font-family: inherit;
        font-size: 1rem;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@19.2.0/index.js",
    "react-dom/client": "https://aistudiocdn.com/react-dom@19.2.0/client.js",
    "react-router-dom": "https://esm.sh/react-router-dom@6.24.1?external=react",
    "@google/genai": "https://esm.sh/@google/genai@0.14.0",
    "idb": "https://esm.sh/idb@8.0.0",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "react/": "https://aistudiocdn.com/react@19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use absolute path to ensure correct origin resolution
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(error => {
              // Log but don't alarm normal users; SW failure often happens in dev/preview environments
              console.log('ServiceWorker registration failed (offline mode may be unavailable): ', error);
            });
        });
      }
    </script>
  </body>
</html>
